{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Pas 1: Incarcati fisierele</h4>
            </div>
            <div class="card-body">
                <form action="/upload" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fisier MASTER general convocari si HSD *</label>
                        <input type="file" name="master" class="form-control" accept=".xlsx,.xls" required>
                        <div class="form-text">Excel cu sheet-uri per UAT</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fisiere PDF - H si PV *</label>
                        <input type="file" name="pdfs" class="form-control" accept=".pdf" multiple required>
                        <div class="form-text">Selectati toate PDF-urile H si PV (se pot selecta mai multe odata)</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger btn-lg">Incarca si Verifica</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
